services:
  api:
    build: .
    container_name: mock_interview_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
    volumes:
      - ./app:/code/app
      - ./frontend:/code/frontend

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: mock_interview_streamlit
    ports:
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      - api
    command: streamlit run streamlit_app_deploy.py --server.port 8501 --server.address 0.0.0.0

  db:
    image: postgres:16-alpine
    container_name: mock_interview_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mock_interview
    ports:
      - "5555:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: mock_interview_redis
    ports:
      - "6379:6379"

  celery_worker:
    build: .
    container_name: mock_interview_celery
    command: celery -A app.celery_app.celery worker --loglevel=info
    env_file:
      - .env
    depends_on:
      - db
      - redis
    volumes:
      - ./app:/code/app

volumes:
  postgres_data: